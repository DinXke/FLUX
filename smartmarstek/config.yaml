name: SmartMarstek
version: "1.0.0"
slug: smartmarstek
description: Smart battery management dashboard for Marstek batteries with ENTSO-E price strategy, solar forecast and Home Assistant integration.
url: https://github.com/DinXke/SmartMarstek
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386

startup: application
boot: auto
init: false

# Persistent data storage
map:
  - data:rw

# HA dashboard integration (sidebar panel)
ingress: true
ingress_port: 5000
panel_icon: mdi:battery-charging
panel_title: SmartMarstek

# Port for direct access (optional, alongside ingress)
ports:
  5000/tcp: 5000
ports_description:
  5000/tcp: SmartMarstek web interface

# Requires host network to reach ESPHome devices, InfluxDB, etc.
host_network: false

# Add-on options (shown in HA add-on configuration tab)
options:
  log_level: info

schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)
