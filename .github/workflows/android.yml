name: Build & release Android APK

on:
  push:
    tags:
      - "v*"

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build React app
        run: cd frontend && npm run build

      - name: Sync Capacitor
        run: cd frontend && npx cap sync android

      - name: Make Gradle wrapper executable
        run: chmod +x frontend/android/gradlew

      - name: Build debug APK
        run: cd frontend/android && ./gradlew assembleDebug

      - name: Extract version
        id: meta
        run: echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          name: FLUX ${{ steps.meta.outputs.version }}
          body: |
            ## FLUX Android app ${{ steps.meta.outputs.version }}

            Verbindt met een bestaande FLUX installatie via REST API.

            **Installatie:**
            1. Download `app-debug.apk` hieronder
            2. Schakel "Onbekende bronnen" / "Installeren vanuit onbekende apps" in op je Android toestel
            3. Installeer de APK
            4. Voer bij eerste start de URL van je FLUX instantie in (bijv. `http://192.168.1.100:5000`)

            **Vereisten:**
            - Android 7.0+ (API 24+)
            - FLUX instantie bereikbaar op het lokale netwerk of via VPN
