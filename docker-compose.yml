services:
  smartmarstek:
    build:
      context: .
      dockerfile: Dockerfile.standalone
    container_name: smartmarstek
    restart: unless-stopped
    network_mode: host
    depends_on:
      - influxdb
    environment:
      MARSTEK_DATA_DIR: /data
      MARSTEK_FRONTEND_DIST: /app/frontend/dist
      PYTHONUNBUFFERED: 1
      INFLUX_URL: http://localhost:8086
      INFLUX_USERNAME: ${INFLUX_USERNAME}
      INFLUX_PASSWORD: ${INFLUX_PASSWORD}
      INFLUX_ORG: ${INFLUX_ORG}
      INFLUX_BUCKET: ${INFLUX_BUCKET}
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      TIMEZONE: ${TIMEZONE:-Europe/Brussels}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      STANDALONE_MODE: "true"
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      FLUX_ADMIN_USER: ${FLUX_ADMIN_USER:-admin}
      FLUX_ADMIN_PASSWORD: ${FLUX_ADMIN_PASSWORD}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-24}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY}
      ENTSOE_API_KEY: ${ENTSOE_API_KEY}
      ENTSOE_COUNTRY: ${ENTSOE_COUNTRY}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      SMA_IP: ${SMA_IP}
      SMA_PORT: ${SMA_PORT}
      HOMEWIZARD_IP: ${HOMEWIZARD_IP}
      FRANK_ENERGIE_API_KEY: ${FRANK_ENERGIE_API_KEY}
      DAIKIN_TOKEN: ${DAIKIN_TOKEN}
      BOSCH_TOKEN: ${BOSCH_TOKEN}
      BOSCH_APPLIANCES_CLIENT_ID: ${BOSCH_APPLIANCES_CLIENT_ID:-}
      BOSCH_APPLIANCES_CLIENT_SECRET: ${BOSCH_APPLIANCES_CLIENT_SECRET:-}
      BOSCH_APPLIANCES_REDIRECT_URI: ${BOSCH_APPLIANCES_REDIRECT_URI:-}
      BOSCH_APPLIANCES_SANDBOX: ${BOSCH_APPLIANCES_SANDBOX:-false}
      GRAFANA_EXTERNAL_URL: ${GRAFANA_EXTERNAL_URL:-}
    volumes:
      - flux_data:/data

  influxdb:
    image: influxdb:2.7
    container_name: smartmarstek-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUX_USERNAME}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUX_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUX_BUCKET}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN}
      DOCKER_INFLUXDB_INIT_RETENTION: ${INFLUX_RETENTION:-0}
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2

  grafana:
    image: grafana/grafana:latest
    container_name: smartmarstek-grafana
    restart: unless-stopped
    labels:
      com.flux.provisioning-rev: "2026-04-28-stable-config"
    ports:
      - "3000:3000"
    depends_on:
      influxdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SERVER_ROOT_URL: "${GRAFANA_EXTERNAL_URL:-%(protocol)s://%(domain)s/grafana/}"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      INFLUX_ORG: ${INFLUX_ORG}
      INFLUX_BUCKET: ${INFLUX_BUCKET}
      INFLUX_TOKEN: ${INFLUX_TOKEN}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning

  nginx:
    image: nginx:latest
    container_name: smartmarstek-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      - "smartmarstek-host:host-gateway"
    depends_on:
      - smartmarstek
      - grafana
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  flux_data:
  influxdb_data:
  influxdb_config:
  grafana_data:

networks:
  default:
    name: smartmarstek-network
