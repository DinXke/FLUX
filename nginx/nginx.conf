user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Map X-Forwarded-Proto header to determine real scheme (for reverse proxies like cloudflared)
    map $http_x_forwarded_proto $real_scheme {
        "https" "https";
        default $scheme;
    }

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    # ─────────────────────────────────────────────────────────────────────
    # HTTP Server (redirect to HTTPS if cert exists, otherwise serve HTTP)
    # ─────────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Health check endpoint for Docker
        location /health {
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Grafana (HTTP mode, no SSL)
        location /grafana/ {
            proxy_pass http://grafana:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $real_scheme;
            proxy_hide_header X-Frame-Options;
        }

        # SSE streams (Server-Sent Events) — long-lived connections
        location ~ ^/api/devices/.*/stream {
            proxy_pass http://smartmarstek:5000;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_request_buffering off;
            # SSE requires long timeout since connections stay open indefinitely
            proxy_read_timeout 86400;
            proxy_connect_timeout 60;
            proxy_send_timeout 60;
            # Critical: preserve Connection header for SSE
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $real_scheme;
        }

        # Redirect to HTTPS if certificate exists and not already HTTPS via proxy
        location / {
            set $do_https_redirect 0;
            if (-f /etc/nginx/ssl/cert.pem) {
                set $do_https_redirect 1;
            }
            if ($http_x_forwarded_proto = "https") {
                set $do_https_redirect 0;
            }
            if ($do_https_redirect = "1") {
                return 301 https://$host$request_uri;
            }
            proxy_pass http://smartmarstek:5000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $real_scheme;
            proxy_buffering off;
            proxy_request_buffering off;
        }
    }

    # ─────────────────────────────────────────────────────────────────────
    # HTTPS Server (only if certificate exists)
    # ─────────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.3 TLSv1.2;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Health check endpoint
        location /health {
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # SSE streams (Server-Sent Events) — long-lived connections
        location ~ ^/api/devices/.*/stream {
            proxy_pass http://smartmarstek:5000;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_request_buffering off;
            # SSE requires long timeout since connections stay open indefinitely
            proxy_read_timeout 86400;
            proxy_connect_timeout 60;
            proxy_send_timeout 60;
            # Critical: preserve Connection header for SSE
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Main application reverse proxy
        location / {
            proxy_pass http://smartmarstek:5000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # Grafana (optional, if exposed)
        location /grafana/ {
            proxy_pass http://grafana:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_hide_header X-Frame-Options;
        }

        # InfluxDB (optional, if exposed)
        location /influx/ {
            proxy_pass http://influxdb:8086/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
