<!DOCTYPE html>
<html>
<head>
    <title>SmartMarstek</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            color: white;
        }
        h1 {
            font-size: 3em;
            margin: 0 0 20px 0;
        }
        p {
            font-size: 1.2em;
            margin: 10px 0;
        }
        .links {
            margin-top: 40px;
        }
        a {
            display: inline-block;
            margin: 10px 15px;
            padding: 12px 30px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        a:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SmartMarstek</h1>
        <p>Smart Battery Management Dashboard</p>
        <div class="links">
            <a href="/">Dashboard</a>
            <a href="/grafana/">Grafana</a>
            <a href="https://github.com/DinXke/FLUX">GitHub</a>
        </div>
    </div>
</body>
</html>
